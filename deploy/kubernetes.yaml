apiVersion: v1
kind: Namespace
metadata:
  name: airena
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airena-config
  namespace: airena
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/airena"
  REDIS_URL: "redis://redis-service:6379/0"
  NEXT_PUBLIC_API_URL: "http://backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: airena
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: airena
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: airena
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: airena
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: airena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: airena
spec:
  ports:
    - port: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: airena
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: airena-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: airena-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: airena
spec:
  ports:
    - port: 3000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: airena
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: airena-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: airena-config
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airena-ingress
  namespace: airena
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
